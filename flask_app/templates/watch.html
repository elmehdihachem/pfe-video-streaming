<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ course.titre }}</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #111; color: white; padding: 30px; }
        h1 { margin-bottom: 20px; }
        video { width: 100%; max-width: 900px; border-radius: 10px; }

        .quality-btns { margin: 16px 0; display: flex; gap: 10px; }
        .quality-btns button {
            padding: 8px 20px; border-radius: 6px;
            border: 2px solid #5c4fcf; background: transparent;
            color: white; cursor: pointer; font-size: 14px;
        }
        .quality-btns button.active { background: #5c4fcf; }

        .links { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
        .link-box {
            background: #222; padding: 12px 16px;
            border-radius: 8px; display: flex;
            align-items: center; gap: 10px;
        }
        .link-box input {
            background: transparent; border: none;
            color: #aaa; font-size: 12px; width: 400px;
            outline: none;
        }
        .link-box button {
            background: #5c4fcf; color: white;
            border: none; padding: 6px 14px;
            border-radius: 6px; cursor: pointer;
        }

        a.back { color: #aaa; text-decoration: none; display: inline-block; margin-top: 20px; }
        a.back:hover { color: white; }
    </style>
</head>
<body>

<h1>{{ course.titre }}</h1>

<video id="player" controls autoplay></video>

<div class="quality-btns">
    <button class="active" onclick="loadQuality('720p')">720p</button>
    <button onclick="loadQuality('1080p')">1080p</button>
</div>

<div class="links">
    <div class="link-box">
        <span style="color:#888;font-size:12px">720p</span>
        <input id="url-720" type="text" value="{{ course.playlist_720p }}" readonly>
        <button onclick="copyLink('url-720')">Copier</button>
    </div>
    <div class="link-box">
        <span style="color:#888;font-size:12px">1080p</span>
        <input id="url-1080" type="text" value="{{ course.playlist_1080p }}" readonly>
        <button onclick="copyLink('url-1080')">Copier</button>
    </div>
</div>

<a class="back" href="/">← Retour à la liste</a>

<script>
    const urls = {
        "720p":  "{{ course.playlist_720p }}",
        "1080p": "{{ course.playlist_1080p }}"
    }
    const video   = document.getElementById("player")
    let   hls     = null
    let   current = "720p"

    function loadQuality(quality) {
        current = quality
        document.querySelectorAll(".quality-btns button").forEach(b => {
            b.classList.toggle("active", b.textContent === quality)
        })

        const url = urls[quality]
        if (!url) return

        if (hls) { hls.destroy(); hls = null }

        if (Hls.isSupported()) {
            hls = new Hls()
            hls.loadSource(url)
            hls.attachMedia(video)
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
            video.src = url
        }
    }

    loadQuality("720p")

    function copyLink(inputId) {
        const input = document.getElementById(inputId)
        navigator.clipboard.writeText(input.value)
            .then(() => alert("Lien copié !"))
    }
</script>

</body>
</html>
