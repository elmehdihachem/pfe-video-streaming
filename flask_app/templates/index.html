<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LMS — Vidéos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f5f5f5; padding: 30px; }
        h1 { margin-bottom: 24px; color: #333; }

        .upload-form {
            background: white;
            padding: 24px;
            border-radius: 10px;
            max-width: 500px;
            margin-bottom: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .upload-form input, .upload-form button {
            width: 100%; padding: 10px;
            margin-top: 12px; border-radius: 6px;
            border: 1px solid #ddd; font-size: 14px;
        }
        .upload-form button {
            background: #5c4fcf; color: white;
            border: none; cursor: pointer; font-weight: 500;
        }
        .upload-form button:hover { background: #4a3db0; }

        .video-list { display: grid; gap: 16px; max-width: 800px; }
        .video-card {
            background: white; padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex; justify-content: space-between; align-items: center;
        }
        .video-card h3 { color: #333; margin-bottom: 6px; }
        .badge {
            padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 500;
        }
        .badge.PENDING   { background: #fff3cd; color: #856404; }
        .badge.ENCODING  { background: #cfe2ff; color: #084298; }
        .badge.UPLOADING { background: #d1ecf1; color: #0c5460; }
        .badge.DONE      { background: #d4edda; color: #155724; }
        .badge.ERROR     { background: #f8d7da; color: #721c24; }

        .watch-btn {
            padding: 8px 18px; background: #5c4fcf;
            color: white; border-radius: 6px;
            text-decoration: none; font-size: 14px;
        }
        .watch-btn:hover { background: #4a3db0; }
        .watch-btn.disabled {
            background: #ccc; pointer-events: none;
        }
    </style>
</head>
<body>

<h1>LMS — Gestion des Vidéos</h1>

<div class="upload-form">
    <h2 style="margin-bottom:8px">Ajouter une vidéo</h2>
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="text" name="titre" placeholder="Titre du cours" required>
        <input type="file" name="video" accept="video/*" required>
        <button type="submit">Uploader</button>
    </form>
</div>

<div class="video-list">
    {% for course in courses %}
    <div class="video-card" id="card-{{ course.id }}">
        <div>
            <h3>{{ course.titre }}</h3>
            <small style="color:#888">{{ course.created_at.strftime('%d/%m/%Y %H:%M') }}</small>
        </div>
        <div style="display:flex; align-items:center; gap:12px">
            <span class="badge {{ course.status }}" id="badge-{{ course.id }}">
                {{ course.status }}
            </span>
            <a href="/watch/{{ course.id }}"
               class="watch-btn {% if course.status != 'DONE' %}disabled{% endif %}"
               id="btn-{{ course.id }}">
                Regarder
            </a>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    // Poll automatique pour les vidéos pas encore DONE
    document.querySelectorAll(".video-card").forEach(card => {
        const id     = card.id.replace("card-", "")
        const badge  = document.getElementById("badge-" + id)
        const btn    = document.getElementById("btn-" + id)

        if (badge.textContent.trim() === "DONE" || badge.textContent.trim() === "ERROR") return

        const interval = setInterval(async () => {
            const res  = await fetch("/status/" + id)
            const data = await res.json()

            badge.textContent = data.status
            badge.className   = "badge " + data.status

            if (data.status === "DONE") {
                btn.classList.remove("disabled")
                clearInterval(interval)
            }
            if (data.status === "ERROR") {
                clearInterval(interval)
            }
        }, 4000)
    })
</script>

</body>
</html>
